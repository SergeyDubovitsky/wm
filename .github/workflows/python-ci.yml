name: Python CI

on:
    push:
        paths:
            - ".github/workflows/python-ci.yml"
            - ".python-version"
            - "pyproject.toml"
            - "uv.lock"
            - "apps/**"
            - "libs/**"
            - "infra/**"
            - "tools/**"
            - "tests/**"
    pull_request:
        paths:
            - ".github/workflows/python-ci.yml"
            - ".python-version"
            - "pyproject.toml"
            - "uv.lock"
            - "apps/**"
            - "libs/**"
            - "infra/**"
            - "tools/**"
            - "tests/**"

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Sync workspace
              run: uv sync --frozen --all-packages --group lint

            - name: Run Ruff
              run: uv run --frozen --group lint ruff check apps libs tests infra tools

    test:
        name: Test (${{ matrix.package }})
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                include:
                    - package: edge-agent
                      test_path: apps/edge_agent/tests
                    - package: knx-demo
                      test_path: apps/knx_demo/tests
                    - package: config-registry
                      test_path: apps/config_registry/tests
                    - package: knx-parser
                      test_path: libs/knx_parser/tests
                    - package: wm-demo-stack
                      test_path: libs/wm_demo_stack/tests
                    - package: wm-clickhouse
                      test_path: tools/clickhouse_migrations/tests

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Sync workspace
              run: uv sync --frozen --all-packages

            - name: Run tests
              run: uv run --frozen --package ${{ matrix.package }} pytest ${{ matrix.test_path
                  }}

    integration:
        name: Integration
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version-file: ".python-version"

            - name: Set up uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Sync workspace
              run: uv sync --frozen --all-packages --group integration

            - name: Check compose config
              env:
                  LOCAL_STACK_ENV_FILE: ../../.env.example
              run: docker compose -f infra/local/compose.yaml config --quiet

            - name: Lint Redpanda Connect pipeline
              run: |
                  docker run --rm \
                    -e MQTT_USERNAME=lint \
                    -e MQTT_PASSWORD=lint \
                    -v "$PWD/infra/local/redpanda-connect/mqtt-to-kafka.yaml:/mqtt-to-kafka.yaml:ro" \
                    docker.redpanda.com/redpandadata/connect lint /mqtt-to-kafka.yaml

            - name: Run integration tests
              run: |
                  uv run --frozen --group integration pytest \
                    tests/integration/test_config_registry_postgres.py \
                    tests/integration/test_edge_agent_mqtt_publisher.py \
                    tests/integration/test_edge_agent_knx_to_mqtt.py \
                    tests/integration/test_kafka_to_clickhouse_storage.py \
                    tests/integration/test_grafana_clickhouse.py
