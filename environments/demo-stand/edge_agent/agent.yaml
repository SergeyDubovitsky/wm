agent:
  object_id: "demo-stand-01"
  name: "demo-stand-local"
  id_file: ".local/demo-stand/edge-agent/agent_id"

delivery:
  transport: "mqtt"
  mqtt:
    enabled: true
    version: "5.0"
    broker: "${MQTT_BROKER}"
    topic_root: "wm/v1"
    client_id_prefix: "edge-agent"
    username_env: "MQTT_USERNAME"
    password_env: "MQTT_PASSWORD"
    qos: 1
    clean_start: true
    session_expiry_seconds: 0
    telemetry_message_expiry_seconds: 86400
    publish_metadata: true
    retain_metadata: true
    publish_connection_status: true
    retain_connection_status: true
    connect_timeout_seconds: 5
    retry_backoff_seconds: [5, 15, 60, 300]

storage:
  sqlite_path: ".local/demo-stand/edge-agent/outbox.db"
  retention_days: 7
  dead_letter_after_attempts: 20

observability:
  log_level: "INFO"
  emit_health_events: true
  metrics_bind: "127.0.0.1:9108"
