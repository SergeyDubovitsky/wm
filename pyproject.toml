[project]
name = "web-monitoring"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
integration = [
    "paho-mqtt>=2.1.0",
    "playwright>=1.58.0",
    "pytest>=9.0.2",
]

[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "apps/*",
    "libs/*",
]

[tool.pytest.ini_options]
markers = [
    "integration: end-to-end checks for dockerized local infrastructure",
]
